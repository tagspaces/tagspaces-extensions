<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>URL Viewer for TagSpaces</title>
    <link rel="stylesheet" href="../libs/bootstrap5/bootstrap.min.css" />
    <link rel="stylesheet" href="../common/common.css" />
    <style>
      @media print {
        #openURLButton {
          display: none;
        }
      }
    </style>
    <script src="../libs/bootstrap5/bootstrap.bundle.min.js"></script>
    <script src="../libs/i18next/i18next.min.js"></script>
    <script src="../libs/dompurify/dist/purify.min.js"></script>
    <script src="../libs/file-saver/FileSaver.min.js"></script>
    <script src="../common/common.js"></script>
    <script>
      const filePath = getParameterByName('file');
      let comment = '';
      let locale = getParameterByName('locale');
      if (locale === 'en') {
        locale = 'en_US';
      }
      const encrypted = getParameterByName('encrypted');
      let isViewer = true;
      const MAX_SCREENSHOT_SIZE = 2 * 1024 * 1024; // 2 MB

      function isValidUrl(string) {
        try {
          const u = new URL(string);
          return (
            u.protocol === 'ts:' ||
            u.protocol === 'http:' ||
            u.protocol === 'https:' ||
            u.protocol === 'file:'
          );
        } catch (e) {
          return false;
        }
      }

      function xmlEscape(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&apos;');
      }

      document.addEventListener('readystatechange', () => {
        if (document.readyState === 'complete') {
          sendMessageToHost({ command: 'loadDefaultTextContent' });
          document.getElementById('copyURL').addEventListener('click', (e) => {
            e.stopPropagation();
            const promise = navigator.clipboard.writeText(
              document.getElementById('urlInput').value,
            );
            sendMessageToHost({
              command: 'showAlertDialog',
              title: 'Success',
              message: 'URL copied to clipboard',
            });
          });

          document
            .getElementById('exportScreenshot')
            .addEventListener('click', (e) => {
              if (comment?.startsWith('data:image')) {
                fetch(comment)
                  .then((res) => res.blob())
                  .then((blob) => {
                    saveAs(
                      blob,
                      extractFileName(filePath, isWin ? '\\' : '/') + '.jpg',
                    );
                  });
              }
            });

          // document
          //   .getElementById('copyToClipboard')
          //   .addEventListener('click', (e) => {
          //     if (comment) {
          //       fetch(comment)
          //         .then((res) => res.blob())
          //         .then((blob) => {
          //           const data = [new ClipboardItem({ [blob.type]: blob })];
          //           navigator.clipboard.write(data);
          //         });
          //     }
          //   });

          setupScreenshotControls();

          insertPrintMenuItem();

          insertAboutDialog('https://docs.tagspaces.org/extensions/url-viewer');

          initI18N(locale, 'ns.extension.json');
        }
      });

      /**
       * Optimized and Secure setContent
       */
      function contentChanged() {
        sendMessageToHost({
          command: 'contentChangedInEditor',
          filepath: filePath,
        });
      }

      function getContent() {
        const url = document.getElementById('urlInput')?.value || '';
        if (extractFileExtension(filePath) === '.webloc') {
          return (
            `<?xml version="1.0" encoding="UTF-8"?>\n` +
            `<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n` +
            `<plist version="1.0">\n<dict>\n\t<key>URL</key>\n\t<string>${xmlEscape(url)}</string>\n</dict>\n</plist>`
          );
        }
        // .url INI format
        let out = `[InternetShortcut]\nURL=${url}`;
        if (comment) out += `\nCOMMENT=${comment}`;
        return out;
      }

      function viewerMode(isViewerMode) {
        isViewer = isViewerMode;
        const urlInput = document.getElementById('urlInput');
        if (urlInput) {
          const newInput = urlInput.cloneNode(true);
          urlInput.replaceWith(newInput);
          newInput.readOnly = isViewerMode;
          if (isViewerMode) {
            newInput.addEventListener('dblclick', () => {
              sendMessageToHost({ command: 'editDocument' });
            });
          } else {
            newInput.addEventListener('input', () => contentChanged());
            setupKeyboardShortcuts();
          }
        }
        document.getElementById('screenshotControls').style.display =
          !isViewerMode && extractFileExtension(filePath) === '.url' ? 'flex' : 'none';
      }

      function updateScreenshot(dataUrl) {
        comment = dataUrl;
        const img = document.getElementById('screenshotImg');
        if (dataUrl) {
          img.src = dataUrl;
          img.style.display = 'block';
        } else {
          img.src = '';
          img.style.display = 'none';
        }
        contentChanged();
      }

      function setupScreenshotControls() {
        document.getElementById('pasteScreenshotBtn').addEventListener('click', async () => {
          try {
            const items = await navigator.clipboard.read();
            for (const item of items) {
              const imageType = item.types.find((t) => t.startsWith('image/'));
              if (imageType) {
                const blob = await item.getType(imageType);
                if (blob.size > MAX_SCREENSHOT_SIZE) {
                  console.warn('Clipboard image exceeds 2 MB limit, ignoring.');
                  return;
                }
                const reader = new FileReader();
                reader.onload = (e) => updateScreenshot(e.target.result);
                reader.readAsDataURL(blob);
                return;
              }
            }
          } catch (e) {
            console.warn('Could not read from clipboard:', e.message);
          }
        });

        document.getElementById('selectScreenshotBtn').addEventListener('click', () => {
          document.getElementById('screenshotFileInput').click();
        });

        document.getElementById('screenshotFileInput').addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file && file.type.startsWith('image/')) {
            if (file.size > MAX_SCREENSHOT_SIZE) {
              console.warn('Selected image exceeds 2 MB limit, ignoring.');
              e.target.value = '';
              return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => updateScreenshot(ev.target.result);
            reader.readAsDataURL(file);
          }
          e.target.value = '';
        });

        document.getElementById('removeScreenshotBtn').addEventListener('click', () => {
          updateScreenshot('');
        });
      }

      let keyboardShortcutsSetup = false;
      function setupKeyboardShortcuts() {
        if (keyboardShortcutsSetup) return;
        keyboardShortcutsSetup = true;
        document.body.addEventListener('keydown', (event) => {
          if (
            (event.ctrlKey || event.metaKey) &&
            event.key.toLowerCase() === 's'
          ) {
            event.stopPropagation();
            event.preventDefault();
            sendMessageToHost({ command: 'saveDocument' });
          }
        });
      }

      function setContent(content, filePathParam, isViewMode) {
        if (isViewMode !== undefined) isViewer = isViewMode;
        let url = '';
        let screenshot = '';
        try {
          if (extractFileExtension(filePath) === '.webloc') {
            url = extractUrlFromWebloc(content);
          } else {
            // 1. Optimized .url (INI) parsing
            // We look specifically for the [InternetShortcut] section to be precise
            const lines = content.split(/\r?\n/);
            for (const line of lines) {
              const trimmed = line.trim();
              if (trimmed.startsWith('URL=')) {
                url = trimmed.substring(4).trim();
              } else if (trimmed.startsWith('COMMENT=')) {
                screenshot = trimmed.substring(8).trim();
              }
              // Break early if we have both? (Optional optimization)
              // if (url && screenshot) break;
            }
          }

          // 2. Security: Validate the extracted URL
          if (!isValidUrl(url)) {
            console.warn('Invalid or unsafe URL extracted:', url);
            url = 'INVALID URL'; // Reset to prevent malicious protocol execution
          }

          // 3. Handle Screenshot (COMMENT field)
          comment = screenshot; // store globally for getContent()
          const screenshotImg = document.getElementById('screenshotImg');
          if (screenshotImg) {
            if (
              screenshot.startsWith('data:image/') &&
              screenshot.length > 64
            ) {
              screenshotImg.src = screenshot;
              screenshotImg.style.display = 'block';
            } else {
              screenshotImg.style.display = 'none';
              screenshotImg.src = '';
            }
          }
          document.getElementById('screenshotControls').style.display =
            !isViewer && extractFileExtension(filePath) === '.url' ? 'flex' : 'none';

          // 4. Update UI Inputs safely
          const urlInput = document.getElementById('urlInput');
          if (urlInput) {
            // Clone to wipe stale listeners
            const newInput = urlInput.cloneNode(true);
            urlInput.replaceWith(newInput);
            newInput.value = url;
            newInput.readOnly = isViewer;
            if (isViewer) {
              newInput.addEventListener('dblclick', () => {
                sendMessageToHost({ command: 'editDocument' });
              });
            } else {
              newInput.addEventListener('input', () => contentChanged());
              setupKeyboardShortcuts();
            }
          }

          // 5. Memory/Event Optimization: Prevent listener stacking
          const openURLButton = document.getElementById('openURLButton');
          if (openURLButton) {
            // Clone and replace to wipe all previous event listeners
            const newButton = openURLButton.cloneNode(true);
            openURLButton.replaceWith(newButton);

            if (url) {
              newButton.addEventListener('click', (e) => {
                e.preventDefault();
                const currentUrl = document.getElementById('urlInput').value;
                if (isValidUrl(currentUrl)) {
                  sendMessageToHost({ command: 'openLinkExternally', link: currentUrl });
                } else {
                  console.warn('Blocked opening invalid or unsafe URL:', currentUrl);
                }
              });
              newButton.disabled = false;
              newButton.style.opacity = '1';
            } else {
              newButton.disabled = true;
              newButton.style.opacity = '0.5';
            }
          }
        } catch (err) {
          console.error('Error in setContent:', err.message);
        }
      }

      /**
       * Safer extractUrlFromWebloc
       */
      function extractUrlFromWebloc(xmlText) {
        if (typeof xmlText !== 'string' || !xmlText.trim()) return '';

        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlText, 'application/xml');

        if (doc.getElementsByTagName('parsererror').length > 0) {
          throw new Error('Invalid XML');
        }

        // Use XPath for cleaner/faster lookup of the URL value following the URL key
        const result = doc.evaluate(
          "//key[text()='URL']/following-sibling::string[1]",
          doc,
          null,
          XPathResult.FIRST_ORDERED_NODE_TYPE,
          null,
        );

        const urlNode = result.singleNodeValue;
        if (urlNode && urlNode.textContent) {
          const url = urlNode.textContent.trim();
          try {
            new URL(url);
            return url;
          } catch {
            throw new Error('Found URL key but value is not a valid URL');
          }
        }

        return '';
      }
    </script>
  </head>
  <body>
    <div id="aboutDialogPlaceholder"></div>
    <div style="margin: 10px">
      <div class="input-group">
        <button id="copyURL" type="button" class="btn btn-primary" title="Copy">
          <svg width="24" height="24" class="bi">
            <path
              d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
            ></path>
          </svg>
        </button>
        <input
          id="urlInput"
          type="text"
          class="form-control"
          value="URL of the bookmark"
          aria-label="URL input"
        />
        <button
          type="button"
          id="openURLButton"
          title="Opens the URL in the default browser"
          class="btn btn-primary btn-sm"
        >
          <svg width="24" height="24" class="bi">
            <path
              d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"
            ></path>
          </svg>
          <span data-i18n="openURL" />
        </button>
      </div>
      <img
        id="screenshotImg"
        title="Screenshot of the original web page"
        style="
          margin-top: 10px;
          width: 100%;
          display: none;
          border-radius: 10px;
          border: 1px solid gray;
        "
      />
      <div id="screenshotControls" class="btn-group btn-group-sm" style="display: none; margin-top: 8px;">
        <button id="pasteScreenshotBtn" class="btn btn-primary" title="Paste image from clipboard">
          <svg width="24" height="24" class="bi" fill="currentColor">
            <path d="M19 2h-4.18C14.4.84 13.3 0 12 0S9.6.84 9.18 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2m-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1m7 18H5V4h2v3h10V4h2z"></path>
          </svg> Copy from Clipboard
        </button>
        <button id="selectScreenshotBtn" class="btn btn-primary" title="Select image from file">
          <svg width="24" height="24" class="bi" fill="currentColor">
            <path d="M19 5v14H5V5zm0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m-4.86 8.86-3 3.87L9 13.14 6 17h12z"></path>
          </svg> Select Image
        </button>
        <button id="removeScreenshotBtn" class="btn btn-primary" title="Remove screenshot">
          <svg width="24" height="24" class="bi" fill="currentColor">
            <path d="M7 11v2h10v-2zm5-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8"></path>
          </svg> Remove Screenshot
        </button>
        <input id="screenshotFileInput" type="file" accept="image/*" style="display: none;" />
      </div>
    </div>
    <div id="extFabMenu" class="btn-group dropup-center dropup">
      <button
        type="button"
        class="btn btn-primary btn-lg"
        data-bs-toggle="dropdown"
        aria-expanded="false"
      >
        <svg
          class="bi"
          width="24"
          height="24"
          focusable="false"
          aria-hidden="true"
        >
          <path
            d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"
          ></path>
        </svg>
      </button>
      <ul class="dropdown-menu">
        <li>
          <a id="exportScreenshot" class="dropdown-item" href="#">
            <svg width="24" height="24" class="bi">
              <path
                d="m16 5-1.42 1.42-1.59-1.59V16h-1.98V4.83L9.42 6.42 8 5l4-4 4 4zm4 5v11c0 1.1-.9 2-2 2H6c-1.11 0-2-.9-2-2V10c0-1.11.89-2 2-2h3v2H6v11h12V10h-3V8h3c1.1 0 2 .89 2 2z"
              ></path>
            </svg>
            <span data-i18n="exportScreenshot" />
          </a>
        </li>

          <a id="copyToClipboard" class="dropdown-item" href="#">
            <svg width="24" height="24" class="bi">

                d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2m0 16H8V7h11z"
              ></path>
            </svg>
            <span
              data-i18n="copyToClipboard"
              data-i18ntitle="copyToClipboardTitle"

        </li> -->
        <!-- <li><hr class="dropdown-divider" /></li> -->
        <li id="printMenuItemPlaceholder"></li>
        <!-- <li><hr class="dropdown-divider" /></li> -->
        <li id="aboutMenuItemPlaceholder"></li>
      </ul>
    </div>
  </body>
</html>
